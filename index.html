<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#8fd3ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Fredoka:wght@300..700&display=swap" rel="stylesheet" />
    <title>Isla Monstruo — Spanish Monster Island</title>
  </head>
  <body>
    <main id="app">
      <!-- ============================ Gameplay HUD ============================ -->
      <section id="hud" class="hidden" aria-live="polite">
        <button id="pal-button" class="hud-chip" type="button" aria-label="My monster pals">
          <span class="hud-chip__icon" data-icon="egg"></span><span id="pal-count" class="hud-chip__count">0</span>
        </button>
        <button id="coin-chip" class="hud-chip" type="button" aria-label="Monedas — tap to customize Thomas">
          <span data-icon="coin"></span><span id="coin-count" class="hud-chip__count">0</span>
        </button>

        <div id="quest-card" role="status">
          <span id="quest-icon" data-icon="magnifyingGlass"></span>
          <button id="replay-button" type="button" aria-label="Hear it again">
            <span class="replay-wave"></span><span data-icon="speakerHigh"></span>
          </button>
        </div>

        <button id="settings-button" class="hud-chip" type="button" aria-label="Settings">
          <span class="hud-chip__icon" data-icon="gear"></span>
        </button>
      </section>

      <!-- Center celebration banner (brief, non-blocking) -->
      <div id="banner" class="hidden" aria-hidden="true"></div>
      <!-- Unlock toast -->
      <div id="toast" class="hidden" aria-hidden="true"></div>

      <!-- Joystick hint (visible dashed ring on touch screens before first touch) -->
      <div id="joystick-hint" aria-hidden="true"></div>
      <!-- Joystick (mobile / touch) — floats to wherever thumb lands -->
      <div id="touch-controls" aria-hidden="true">
        <div id="touch-stick"><div id="touch-knob"></div></div>
      </div>

      <!-- ============================ Lumi Says overlay ======================= -->
      <div id="simon-overlay" class="hidden" aria-label="Lumi Says">
        <div class="simon-prompt" id="simon-prompt"></div>
        <div class="simon-grid">
          <button class="simon-tile" id="simon-tile-0" type="button">
            <span class="simon-tile__icon"></span>
            <span class="simon-tile__label"></span>
          </button>
          <button class="simon-tile" id="simon-tile-1" type="button">
            <span class="simon-tile__icon"></span>
            <span class="simon-tile__label"></span>
          </button>
          <button class="simon-tile" id="simon-tile-2" type="button">
            <span class="simon-tile__icon"></span>
            <span class="simon-tile__label"></span>
          </button>
          <button class="simon-tile" id="simon-tile-3" type="button">
            <span class="simon-tile__icon"></span>
            <span class="simon-tile__label"></span>
          </button>
        </div>
      </div>

      <!-- ============================ Start screen ============================ -->
      <div id="start-screen" class="overlay">
        <div class="start-card">
          <img src="assets/lumi_portrait.png" class="start-lumi" alt="Lumi" />
          <h1 class="start-title">Isla&nbsp;Monstruo</h1>
          <p class="start-sub">Spanish Monster Island</p>
          <button id="play-button" class="big-button" type="button">▶&nbsp;Jugar</button>
          <button id="customizer-button" class="secondary-button" type="button"><span class="icon" data-icon="palette"></span> Personalizar a Thomas</button>
          <p id="voice-note" class="start-note"></p>
        </div>
      </div>

      <!-- ============================ Customizer ============================ -->
      <div id="customizer" class="overlay hidden">
        <div class="panel panel--wide">
          <header class="panel__head">
            <h2>Color de Thomas</h2>
            <button class="icon-close" id="customizer-close" type="button" aria-label="Close">✕</button>
          </header>
          <div class="customizer-body">
            <div class="customizer-left">
              <div class="customizer-preview">
                <img id="customizer-thomas" src="" alt="Thomas" class="customizer-thomas-img" />
              </div>
              <p class="customizer-balance"><span class="icon" data-icon="coin"></span> <span id="customizer-coins">0</span> monedas</p>
            </div>
            <div class="customizer-right">
              <p class="customizer-section-label">Colores gratis</p>
              <div id="customizer-free" class="color-orbs"></div>
              <p class="customizer-section-label customizer-section-label--earned">Gana más jugando <span class="icon" data-icon="lock"></span></p>
              <div id="customizer-earned" class="color-orbs"></div>
            </div>
          </div>
          <div id="customizer-confirm" class="customizer-confirm hidden">
            <button id="customizer-cancel-btn" class="confirm-cancel" type="button">✕ Cancelar</button>
            <button id="customizer-buy-btn" class="confirm-buy" type="button">¡Comprar! <span id="customizer-buy-cost">10</span> <span class="icon" data-icon="coin"></span></button>
          </div>
        </div>
      </div>

      <!-- ============================ Pal Book ============================ -->
      <div id="pal-book" class="overlay hidden">
        <div class="panel">
          <header class="panel__head">
            <h2>Mis Chispas</h2>
            <button class="icon-close" data-close="pal-book" type="button" aria-label="Close">✕</button>
          </header>
          <div id="pal-grid" class="pal-grid"></div>
          <p class="panel__hint">Toca una Chispa para escuchar su palabra <span class="icon" data-icon="speakerHigh"></span></p>
        </div>
      </div>

      <!-- ============================ Settings ============================ -->
      <div id="settings-panel" class="overlay hidden">
        <div class="panel">
          <header class="panel__head">
            <h2>Settings</h2>
            <button class="icon-close" data-close="settings-panel" type="button" aria-label="Close">✕</button>
          </header>
          <label class="toggle-row">
            <span><span class="icon" data-icon="musicNotes"></span> Sound</span>
            <input id="set-sound" type="checkbox" checked />
          </label>
          <label class="toggle-row">
            <span><span class="icon" data-icon="gauge"></span> Slower Spanish</span>
            <input id="set-slow" type="checkbox" />
          </label>
          <label class="toggle-row">
            <span><span class="icon" data-icon="moon"></span> Calm mode (less motion)</span>
            <input id="set-calm" type="checkbox" />
          </label>
          <button id="customizer-settings-button" class="text-button" type="button"><span class="icon" data-icon="palette"></span> Personalizar a Thomas →</button>
          <button id="grownups-button" class="text-button" type="button">For grown-ups →</button>
        </div>
      </div>

      <!-- ============================ Parent gate ============================ -->
      <div id="parent-gate" class="overlay hidden">
        <div class="panel">
          <header class="panel__head">
            <h2>Grown-ups only</h2>
            <button class="icon-close" data-close="parent-gate" type="button" aria-label="Close">✕</button>
          </header>
          <p class="panel__hint" id="gate-question">Solve to continue:</p>
          <div class="gate-answers" id="gate-answers"></div>
        </div>
      </div>

      <!-- ============================ Parent dashboard ============================ -->
      <div id="parent-dashboard" class="overlay hidden">
        <div class="panel panel--wide">
          <header class="panel__head">
            <h2>Progress</h2>
            <button class="icon-close" data-close="parent-dashboard" type="button" aria-label="Close">✕</button>
          </header>
          <div id="dash-body" class="dash-body"></div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
